<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <script type="module" src="/ch15.11-15/ex12/index.js"></script>
    <title>AI Chat</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px;
            background: #667eea;
            color: #fff;
            text-align: center;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #fafafa;
        }

        .message {
            margin-bottom: 12px;
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user {
            background: #667eea;
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            background: #e5e7eb;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            padding: 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .chat-input button {
            padding: 0 16px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            AIチャット
        </div>

        <div class="chat-messages">
            <div class="message user">
                こんにちは！
            </div>

            <div class="message ai">
                こんにちは！今日は何をお手伝いしましょうか？
            </div>

            <div class="talk"></div>

            <form id="chat-input">
                <input type="text" id="message" placeholder="メッセージを入力">
                <button type="submit">送信</button>
            </form>
        </div>

</body>

</html>
